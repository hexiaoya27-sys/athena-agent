version: '3.9'

services:
  # ============================================
  # 1. Athena 主应用
  # ============================================
  athena-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: athena-app
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
      - qdrant
    volumes:
      - ../logs:/app/logs
    networks:
      - athena-net

  # ============================================
  # 2. PostgreSQL (LangGraph Checkpointer + 业务数据)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: athena-postgres
    restart: always
    environment:
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: athena
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - athena-net

  # ============================================
  # 3. Redis (短期记忆 + 缓存)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: athena-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - athena-net

  # ============================================
  # 4. Qdrant (向量数据库 - 长期记忆)
  # ============================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: athena-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - athena-net

  # ============================================
  # 5. Prometheus (监控指标)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: athena-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - athena-net

  # ============================================
  # 6. Grafana (可视化仪表盘)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: athena-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - athena-net

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  grafana_data:

networks:
  athena-net:
    driver: bridge